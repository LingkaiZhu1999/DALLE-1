data:
  data_dir: /scratch/shareddata/dldata/laion400M/img2dataset/laion400m-data
  image_size: 32
  batch_size: 4
  num_workers: 2
  shuffle_buffer: 128
  max_shards: 1
  augmentation: transformer
train:
  output_dir: runs/transformer_probe
  steps: 20
  lr: 0.0005
  weight_decay: 0.01
  warmup_steps: 2
  grad_clip: 1.0
  log_every: 1
  save_every: 10
  mixed_precision: bf16
  compile: false
  seed: 1337
dvae:
  image_size: 32
  hidden_channels: 16
  channel_multipliers: [1, 2]
  num_res_blocks: 1
  codebook_size: 128
  code_dim: 128
  kl_weight: 0.0001
  temperature: 0.9
transformer:
  text_vocab_size: 128
  image_vocab_size: 128
  text_seq_len: 16
  text_lowercase: true
  bpe_dropout: 0.0
  image_tokens_per_side: 8
  dim: 64
  depth: 2
  heads: 4
  mlp_ratio: 4.0
  dropout: 0.0
  image_loss_weight: 1.0
  text_loss_weight: 0.125
